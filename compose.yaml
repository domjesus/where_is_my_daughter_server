services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        volumes:
            - '.:/var/www/html'
        environment:
            - APP_ENV=local
        networks:
            - internal

    server:
        image: nginx:alpine
        ports:
            - '${APP_PORT:-80}:80'
        volumes:
            - '.:/var/www/html'
            - './docker/nginx/default.conf:/etc/nginx/conf.d/default.conf'
        depends_on:
            - app
        networks:
            - internal

    node:
        image: node:20-alpine
        volumes:
            - '.:/var/www/html'
        working_dir: /var/www/html
        ports:
            - '${VITE_PORT:-5173}:5173'
        command: sh -c "npm install --legacy-peer-deps && npm run dev"
        networks:
            - internal

networks:
    internal:
        driver: bridge
